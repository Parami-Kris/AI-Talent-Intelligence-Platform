services:
  mysql:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_resume_screening}
    ports:
      # Host port 3307 (not 3306) - avoids clashing with a MySQL server already
      # running locally on the default port. The backend container reaches this
      # service over the internal Docker network on port 3306 regardless; this
      # mapping is only for connecting a host-side client (e.g. MySQL Workbench).
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:7860"
    env_file:
      - .env
    environment:
      # Override whatever host-mode values are in .env (e.g. MYSQL_HOST=localhost
      # for running the backend directly on the host) with the compose network's
      # own service name/port, since the backend container reaches MySQL through
      # the Docker network, not localhost.
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_resume_screening}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
